name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main", "v5"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: RuboCop
    steps:
    - uses: actions/checkout@v7

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0'
        bundler-cache: true

    - run: bundle exec rake rubocop

  types:
    runs-on: ubuntu-latest
    name: Types (Steep + RBS)
    steps:
    - uses: actions/checkout@v7

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0'
        bundler-cache: true

    - name: Validate RBS signatures
      run: bundle exec rake rbs

    - name: Type check (Steep, strict)
      run: bundle exec rake steep

    - name: Type coverage gate (untyped-call baseline)
      run: bundle exec rake steep:coverage

    - name: Runtime signature check (RBS::Test)
      run: bundle exec rake rbs:test

  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby_version }}
    strategy:
      matrix:
        ruby_version: [ruby-head, '4.0', '3.4', '3.3', '3.2']

    env:
      COVERAGE: true

    steps:
    - uses: actions/checkout@v7

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby_version }}
        bundler-cache: true
      continue-on-error: ${{ matrix.ruby_version == 'ruby-head' }}

    - run: bundle exec rake spec
      continue-on-error: ${{ matrix.ruby_version == 'ruby-head' }}

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: svyatov/sec_id
        files: ./coverage/coverage.xml
        fail_ci_if_error: true
      # Only upload coverage for the latest stable Ruby version
      if: ${{ matrix.ruby_version == '4.0' }}

  rails:
    runs-on: ubuntu-latest
    name: Rails ${{ matrix.rails_version }}
    strategy:
      fail-fast: false
      matrix:
        rails_version: ['7.2', '8.0', '8.1', head]

    env:
      BUNDLE_GEMFILE: gemfiles/rails_${{ matrix.rails_version }}.gemfile

    steps:
    - uses: actions/checkout@v7

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0'
        bundler-cache: true
      continue-on-error: ${{ matrix.rails_version == 'head' }}

    - run: bundle exec rake spec
      continue-on-error: ${{ matrix.rails_version == 'head' }}
